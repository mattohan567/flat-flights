name: record-tracks

# Records real ADS-B traces (lat/lon/altitude) for the curated flights and
# commits them as static JSON the site serves. adsb.lol trace files cover the
# current UTC day only, so three runs a day + idempotent merging capture
# flights that span the day boundary.

on:
  schedule:
    - cron: "17 1,9,17 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: record-tracks
  cancel-in-progress: false

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Record tracks
        run: node scripts/record-tracks.mjs

      - name: Commit and push
        run: |
          git config user.name "track-recorder[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tracks
          if git diff --cached --quiet; then
            echo "no new tracks"
          else
            git commit -m "tracks: $(date -u +%F) [skip ci]"
            git pull --rebase origin main
            git push
          fi
